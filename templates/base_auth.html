{% load static %}
<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}SHARE Bear{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9f9f8; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Manrope', sans-serif; }
        .ambient-shadow { box-shadow: 0 20px 40px -4px rgba(0,48,32,0.06); }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.45s ease-out both; }
        .field-input {
            width: 100%;
            background: #f3f4f3;
            border: 1.5px solid #e1e3e2;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.9375rem;
            color: #191c1c;
            transition: border-color 0.2s, background 0.2s;
        }
        .field-input:focus {
            outline: none;
            border-color: #003020;
            background: #ffffff;
        }
        .field-input::placeholder { color: #9ca8a4; }
        .field-input.error { border-color: #dc2626; }
        .mobile-nav-icon { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; transition: font-variation-settings 0.15s; }
        .mobile-nav-icon.is-active { font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
        .mobile-nav-tab { -webkit-tap-highlight-color: transparent; }
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            #mobile-bottom-nav { padding-bottom: env(safe-area-inset-bottom); }
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#003020',
                        'primary-container': '#154734',
                        'on-primary': '#ffffff',
                        'secondary-container': '#feb71a',
                        'on-secondary-container': '#6b4b00',
                        surface: '#f9f9f8',
                        'surface-container-low': '#f3f4f3',
                        'surface-container': '#edeeed',
                        'surface-container-high': '#e1e3e2',
                        'surface-container-lowest': '#ffffff',
                        'on-surface': '#191c1c',
                        'on-surface-variant': '#414944',
                        'outline-variant': '#c0c9c2',
                    },
                    borderRadius: {
                        DEFAULT: '1rem',
                        lg: '1.5rem',
                        xl: '2rem',
                        full: '9999px',
                    },
                    fontFamily: {
                        display: ['Manrope', 'sans-serif'],
                        body: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    letterSpacing: { tightest: '-.02em' },
                },
            },
        }
    </script>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen pb-16 md:pb-0">
{% block body %}{% endblock %}

<nav id="mobile-bottom-nav" class="fixed bottom-0 inset-x-0 z-50 md:hidden border-t border-outline-variant/20" style="background:rgba(249,249,248,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);">
    <div class="flex h-14">
        <a href="{% url 'home' %}" data-nav="home" class="mobile-nav-tab flex-1 flex flex-col items-center justify-center gap-0.5 text-on-surface-variant">
            <span class="material-symbols-outlined mobile-nav-icon" style="font-size:22px;line-height:1">home</span>
            <span class="text-[10px] font-semibold font-body leading-none">Home</span>
        </a>
        <a href="{% url 'ai_quote' %}" data-nav="ai_quote" class="mobile-nav-tab flex-1 flex flex-col items-center justify-center gap-0.5 text-on-surface-variant">
            <span class="material-symbols-outlined mobile-nav-icon" style="font-size:22px;line-height:1">request_quote</span>
            <span class="text-[10px] font-semibold font-body leading-none">AI Quote</span>
        </a>
        {% if user.is_authenticated %}
        <a href="{% url 'user_items' %}" data-nav="user_items" class="mobile-nav-tab flex-1 flex flex-col items-center justify-center gap-0.5 text-on-surface-variant">
            <span class="material-symbols-outlined mobile-nav-icon" style="font-size:22px;line-height:1">inventory_2</span>
            <span class="text-[10px] font-semibold font-body leading-none">My Items</span>
        </a>
        <a href="{% url 'profile' %}" data-nav="profile" class="mobile-nav-tab flex-1 flex flex-col items-center justify-center gap-0.5 text-on-surface-variant">
            <span class="material-symbols-outlined mobile-nav-icon" style="font-size:22px;line-height:1">person</span>
            <span class="text-[10px] font-semibold font-body leading-none">Account</span>
        </a>
        {% else %}
        <a href="{% url 'login' %}" data-nav="user_items" class="mobile-nav-tab flex-1 flex flex-col items-center justify-center gap-0.5 text-on-surface-variant">
            <span class="material-symbols-outlined mobile-nav-icon" style="font-size:22px;line-height:1">inventory_2</span>
            <span class="text-[10px] font-semibold font-body leading-none">My Items</span>
        </a>
        <a href="{% url 'login' %}" data-nav="profile" class="mobile-nav-tab flex-1 flex flex-col items-center justify-center gap-0.5 text-on-surface-variant">
            <span class="material-symbols-outlined mobile-nav-icon" style="font-size:22px;line-height:1">person</span>
            <span class="text-[10px] font-semibold font-body leading-none">Account</span>
        </a>
        {% endif %}
    </div>
</nav>
<script>
(function () {
    var path = window.location.pathname;
    var active = null;
    if (path === '/') active = 'home';
    else if (path.startsWith('/ai-quote/')) active = 'ai_quote';
    else if (path.startsWith('/accounts/items')) active = 'user_items';
    else if (path.startsWith('/accounts/profile')) active = 'profile';
    if (!active) return;
    var tab = document.querySelector('[data-nav="' + active + '"]');
    if (!tab) return;
    tab.style.color = '#003020';
    var icon = tab.querySelector('.mobile-nav-icon');
    if (icon) icon.classList.add('is-active');
})();
</script>
</body>
</html>
